name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.0' # Matches your project

    - name: Build binaries (macOS Universal)
      run: |
        make build-universal
        
        # Package a single universal tarball that works on all Macs
        tar -czf time-tracker-darwin-universal.tar.gz -C bin time-tracker time-tracker-location

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          time-tracker-darwin-universal.tar.gz
        draft: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
